<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="logo-g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <filter id="blur-bg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
    </filter>
  </defs>

  <rect width="800" height="200" fill="#090d16" rx="8"/>
  
  <circle cx="110" cy="100" r="50" fill="#ec4899" opacity="0.15" filter="url(#blur-bg)"/>
  <circle cx="130" cy="100" r="40" fill="#10b981" opacity="0.12" filter="url(#blur-bg)"/>

  <g transform="translate(60, 50)">
    <path d="M 50,10 A 40,40 0 0,0 14,76 A 8,8 0 1,0 26,86 A 24,24 0 0,1 50,26 A 8,8 0 0,0 50,10 Z" fill="url(#logo-g1)" />
    <path d="M 50,90 A 40,40 0 0,0 86,24 A 8,8 0 1,0 74,14 A 24,24 0 0,1 50,74 A 8,8 0 0,0 50,90 Z" fill="url(#logo-g2)" />
    <circle cx="50" cy="50" r="7" fill="#ffffff"/>
    <circle cx="50" cy="50" r="14" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  </g>

  <g transform="translate(195, 0)">
    <text x="0" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="56" font-weight="900" fill="#ffffff" letter-spacing="-1.5">HISAlign</text>
    <text x="2" y="142" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="15" font-weight="400" fill="#94a3b8" letter-spacing="0.2">
      Whole-slide image alignment tool for <tspan fill="#ec4899" font-weight="600">H&amp;E</tspan> and <tspan fill="#10b981" font-weight="600">Multiplex IHC</tspan>
    </text>
  </g>
</svg>
