<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <linearGradient id="he-flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="60%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <linearGradient id="ihc-flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <rect width="800" height="200" fill="#ffffff" rx="12" stroke="#f1f5f9" stroke-width="1.5"/>
  
  <g transform="translate(60, 50)" filter="url(#soft-shadow)">
    <path d="M 50,10 
             C 20,10 10,35 10,54 
             C 10,75 28,90 45,90 
             C 52,90 56,84 52,78 
             C 48,72 40,74 34,74 
             C 24,74 24,60 26,54 
             C 28,44 36,24 50,24 
             C 56,24 56,10 50,10 Z" 
          fill="url(#he-flow)" />
          
    <path d="M 50,90 
             C 80,90 90,65 90,46 
             C 90,25 72,10 55,10 
             C 48,10 44,16 48,22 
             C 52,28 60,26 66,26 
             C 76,26 76,40 74,46 
             C 72,56 64,76 50,76 
             C 44,76 44,90 50,90 Z" 
          fill="url(#ihc-flow)" />

    <circle cx="21" cy="42" r="4" fill="#a855f7" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="31" cy="24" r="3.5" fill="#f43f5e" stroke="#ffffff" stroke-width="1"/>
    <circle cx="79" cy="58" r="4" fill="#06b6d4" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="69" cy="76" r="3.5" fill="#059669" stroke="#ffffff" stroke-width="1"/>

    <line x1="21" y1="42" x2="65" y2="42" stroke="#64748b" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>
    <line x1="35" y1="58" x2="79" y2="58" stroke="#64748b" stroke-width="1" stroke-dasharray="2 2" opacity="0.4"/>

    <circle cx="50" cy="50" r="16" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3 2" opacity="0.4"/>
    <circle cx="50" cy="50" r="10" fill="none" stroke="#0f172a" stroke-width="1" opacity="0.15"/>
    <circle cx="50" cy="50" r="5" fill="#0f172a"/>
    <circle cx="50" cy="50" r="2" fill="#ffffff"/>
  </g>

  <g transform="translate(195, 0)">
    <text x="0" y="104" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="56" font-weight="900" fill="#0f172a" letter-spacing="-1.5">HISAlign</text>
    
    <text x="2" y="142" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="15" font-weight="500" fill="#475569" letter-spacing="0.1">
      Whole-slide image alignment tool for <tspan fill="#e11d48" font-weight="600">H&amp;E</tspan> and <tspan fill="#0d9488" font-weight="600">Multiplex IHC</tspan>
    </text>
  </g>
</svg>
