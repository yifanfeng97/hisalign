name: Lint

on:
  push:
    branches: [main]
    paths:
      - "src/hisalign/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/hisalign/**/*.py"
      - "tests/**/*.py"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"

permissions:
  contents: read

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install ruff
        run: uv tool install ruff

      - name: Run ruff linter
        run: ruff check src/hisalign tests

      - name: Run ruff formatter check
        run: ruff format --check src/hisalign tests
